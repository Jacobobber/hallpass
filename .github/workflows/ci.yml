name: ci

on:
  push:
    branches: [main]
  pull_request:
  workflow_dispatch:

jobs:
  lint:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
      - uses: astral-sh/setup-uv@v5
        with:
          python-version: "3.12"
          enable-cache: false
      - run: uv run --with ruff ruff check .
      - run: uv run --with ruff ruff format --check .
      - run: uv run --group dev --with mypy mypy --strict src
      - run: python scripts/gen_catalog.py --check   # docs/CATALOG.md must be fresh

  core-only:
    # The "core installs with one runtime dependency, no mcp/httpx" claim is a
    # headline; test it in an isolated env with only the base package present.
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
      - uses: astral-sh/setup-uv@v5
        with:
          python-version: "3.12"
          enable-cache: false
      - run: uv run --isolated --no-project --with . python -c "import hallpass; from hallpass import Hallpass, TokenVerifier, CredentialVault; print('core-only import ok')"

  test:
    runs-on: ${{ matrix.os }}
    strategy:
      matrix:
        os: [ubuntu-latest, windows-latest]
        python-version: ["3.10", "3.11", "3.12", "3.13", "3.14"]
    steps:
      - uses: actions/checkout@v4
      - uses: astral-sh/setup-uv@v5
        with:
          python-version: ${{ matrix.python-version }}
          enable-cache: false
      - run: uv run --group dev pytest -q

  image:
    # Build the container image and smoke it, so the deployable artifact is
    # itself under test: it builds, the CLI runs inside it, and it runs as the
    # non-root user (never root).
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
      - run: docker build -t hallpass:ci .
      - run: docker run --rm hallpass:ci doctor --dev   # exits 0 (warnings-only)
      - run: docker run --rm hallpass:ci --help
      - name: image runs as a non-root user
        run: test "$(docker run --rm --entrypoint whoami hallpass:ci)" = "hallpass"

  compose:
    # Bring the multi-replica stack up (Postgres + Redis + migrate + 2 app
    # replicas + LB) and assert the RUNNING artifact behaves: /healthz and
    # /readyz are 200 through the LB (both replicas' backends reachable), and an
    # unauthenticated /tools is 401 -- deny-by-default end to end. This tests the
    # container + compose topology, not just the library.
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
      - name: write .env
        run: |
          # compose auto-reads .env for EVERY command (up, logs, down), so the
          # required vars resolve in the teardown steps too. A valid Fernet key
          # is urlsafe-base64 of 32 bytes (no cryptography dependency).
          {
            echo "HALLPASS_ISSUER=https://issuer.example"
            echo "HALLPASS_AUDIENCE=https://api.example"
            echo "HALLPASS_JWKS_URL=https://issuer.example/jwks"
            echo "HALLPASS_VAULT_KEY=$(python3 -c 'import base64,os;print(base64.urlsafe_b64encode(os.urandom(32)).decode())')"
          } > .env
      - name: bring up the stack
        run: docker compose up -d --build
      - name: wait for readiness through the load balancer
        run: |
          for i in $(seq 1 40); do
            code=$(curl -s -o /dev/null -w '%{http_code}' http://localhost:8080/readyz || true)
            echo "attempt $i: /readyz -> $code"
            [ "$code" = "200" ] && exit 0
            sleep 3
          done
          echo "readiness never reached 200"; exit 1
      - name: deny-by-default through the running artifact
        run: |
          test "$(curl -s -o /dev/null -w '%{http_code}' http://localhost:8080/healthz)" = "200"
          test "$(curl -s -o /dev/null -w '%{http_code}' http://localhost:8080/tools)" = "401"
          # the admin dashboard is served (unauthenticated shell)...
          test "$(curl -s -o /dev/null -w '%{http_code}' http://localhost:8080/admin)" = "200"
          curl -s http://localhost:8080/admin | grep -q "hallpass control"
          # ...but the gated admin API is opaque to a non-admin (same 404 as any unknown path)
          test "$(curl -s -o /dev/null -w '%{http_code}' http://localhost:8080/admin/queue)" = "404"
      - name: stack logs (always, for debugging)
        if: always()
        run: docker compose logs --no-color
      - name: tear down
        if: always()
        run: docker compose down -v

  postgres:
    # The Postgres backends are integration-tested against a real Postgres --
    # the FOR UPDATE SKIP LOCKED exactly-once claim can only be proven against a
    # real engine. The default `test` job skips these (no DATABASE_URL); this
    # job supplies one via a service container.
    runs-on: ubuntu-latest
    services:
      postgres:
        image: postgres:16-alpine
        env:
          POSTGRES_PASSWORD: hallpass
          POSTGRES_DB: hallpass
        ports:
          - 5432:5432
        options: >-
          --health-cmd "pg_isready -U postgres"
          --health-interval 5s
          --health-timeout 5s
          --health-retries 10
    steps:
      - uses: actions/checkout@v4
      - uses: astral-sh/setup-uv@v5
        with:
          python-version: "3.12"
          enable-cache: false
      - run: uv run --group dev --extra postgres pytest tests/test_postgres_backends.py -q
        env:
          HALLPASS_TEST_DATABASE_URL: postgresql://postgres:hallpass@127.0.0.1:5432/hallpass
